name: Security Audit

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 9 * * 1"  # todos los lunes a las 9am UTC

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias del proyecto
        run: pip install -r requirements.txt

      - name: Instalar pip-audit
        run: pip install pip-audit

      - name: Auditar vulnerabilidades
        # CVE-2025-3000 afecta a torch 2.6.0 (torch.jit.script). La versión instalada
        # aquí (2.12.0+) es muy posterior, pero el registro en OSV no declara una
        # "fix version", por lo que pip-audit lo marca igual. Se ignora explícitamente.
        run: pip-audit --ignore-vuln CVE-2025-3000